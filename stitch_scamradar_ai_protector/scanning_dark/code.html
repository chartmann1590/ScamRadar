<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#006c49",
                    "surface-container-high": "#e8e7f3",
                    "outline-variant": "#c4c5d8",
                    "on-secondary-fixed-variant": "#005236",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed": "#001158",
                    "surface-dim": "#dad9e5",
                    "inverse-primary": "#b9c3ff",
                    "tertiary-fixed": "#ffddb8",
                    "on-tertiary-fixed": "#2a1700",
                    "inverse-on-surface": "#f1effc",
                    "on-tertiary": "#ffffff",
                    "on-error": "#ffffff",
                    "surface-tint": "#2b4edf",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#00714d",
                    "primary": "#0033c6",
                    "on-primary-fixed-variant": "#0032c3",
                    "surface-container-low": "#f4f2ff",
                    "outline": "#747686",
                    "primary-fixed-dim": "#b9c3ff",
                    "tertiary-container": "#875400",
                    "on-surface": "#1a1b24",
                    "surface": "#fbf8ff",
                    "on-primary-container": "#d3d8ff",
                    "on-error-container": "#93000a",
                    "secondary-container": "#6cf8bb",
                    "inverse-surface": "#2f3039",
                    "surface-container": "#eeedf9",
                    "on-secondary-fixed": "#002113",
                    "secondary-fixed-dim": "#4edea3",
                    "primary-container": "#2d4fe0",
                    "on-background": "#1a1b24",
                    "surface-variant": "#e2e1ed",
                    "surface-bright": "#fbf8ff",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#6ffbbe",
                    "tertiary": "#663f00",
                    "on-tertiary-container": "#ffd29f",
                    "primary-fixed": "#dee1ff",
                    "tertiary-fixed-dim": "#ffb95f",
                    "background": "#fbf8ff",
                    "on-surface-variant": "#444655",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#e2e1ed"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-md": "16px",
                    "stack-sm": "8px",
                    "touch-target": "48px",
                    "stack-lg": "24px",
                    "stack-xl": "32px",
                    "margin-main": "20px",
                    "gutter-grid": "16px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "title-lg": ["Inter"],
                    "headline-sm": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "label-lg": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "600"}],
                    "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0B1220; /* Brand Anchor Override for Dark Mode Canvas */
            color: #fbf8ff;
            font-family: 'Inter', sans-serif;
        }
        .radar-pulse {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }
        .radar-sweep {
            animation: sweep 4s linear infinite;
            background: conic-gradient(from 0deg, transparent 0%, rgba(45, 79, 224, 0.4) 50%, transparent 100%);
        }
        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen overflow-hidden">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-dim flex items-center h-16 px-margin-main w-full max-w-[360px] mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="shield_with_heart">shield_with_heart</span>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary dark:text-primary-fixed-dim">ScamRadar</h1>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-main pt-16 pb-20">
<!-- Animated Radar Section -->
<div class="relative w-72 h-72 flex items-center justify-center mb-stack-xl">
<!-- Concentric Circles -->
<div class="absolute inset-0 border border-primary/20 rounded-full radar-pulse"></div>
<div class="absolute inset-8 border border-primary/15 rounded-full radar-pulse" style="animation-delay: 0.5s"></div>
<div class="absolute inset-16 border border-primary/10 rounded-full radar-pulse" style="animation-delay: 1s"></div>
<!-- Radar Sweep Gradient -->
<div class="absolute inset-0 rounded-full radar-sweep opacity-40"></div>
<!-- Central Shield Anchor -->
<div class="relative z-10 w-20 h-20 bg-primary/10 backdrop-blur-md rounded-full flex items-center justify-center border border-primary/30 shadow-2xl">
<span class="material-symbols-outlined text-primary-fixed-dim text-4xl" data-icon="shield_with_heart">shield_with_heart</span>
</div>
<!-- Floating Data Particles -->
<div class="absolute top-10 right-10 w-2 h-2 bg-secondary rounded-full blur-[1px] animate-ping"></div>
<div class="absolute bottom-12 left-14 w-1.5 h-1.5 bg-primary-fixed-dim rounded-full blur-[1px] animate-pulse"></div>
</div>
<!-- Feedback Typography -->
<div class="text-center space-y-stack-sm mb-stack-xl">
<h2 class="font-headline-md text-headline-md text-on-surface dark:text-primary-fixed-dim">Analyzing on your device…</h2>
<p class="font-body-md text-body-md text-on-surface-variant dark:text-outline-variant max-w-[280px] mx-auto">
                Your message never leaves your phone. All intelligence is processed locally for your privacy.
            </p>
</div>
<!-- Action Area -->
<button class="px-10 h-12 rounded-full border border-outline/30 text-on-surface-variant dark:text-outline-variant font-label-lg text-label-lg hover:bg-surface-variant/10 active:scale-95 transition-all">
            Cancel
        </button>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 px-4 pb-2 bg-surface-container dark:bg-surface-container-lowest shadow-md z-50 rounded-t-xl">
<!-- Scan (Active) -->
<div class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary-fixed-dim text-on-secondary-container dark:text-on-secondary-fixed rounded-full px-5 py-1 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="radar">radar</span>
<span class="font-label-md text-label-md">Scan</span>
</div>
<!-- Library -->
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1 hover:bg-surface-variant/50 dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="library_books">library_books</span>
<span class="font-label-md text-label-md">Library</span>
</div>
<!-- History -->
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1 hover:bg-surface-variant/50 dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-md text-label-md">History</span>
</div>
<!-- Settings -->
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1 hover:bg-surface-variant/50 dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</div>
</nav>
<!-- Micro-interaction Script -->
<script>
        // Simulate scanning progress by shifting pulse speed
        const radarElements = document.querySelectorAll('.radar-pulse');
        setInterval(() => {
            radarElements.forEach(el => {
                const randomDelay = Math.random() * 2;
                el.style.animationDuration = (2 + Math.random() * 2) + 's';
            });
        }, 3000);
    </script>
</body></html>
