name: Update Community Trending

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-trending:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Firebase secret
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON repository secret."
            exit 1
          fi

      - name: Install Firebase Admin SDK
        run: npm install --no-save firebase-admin@^12.6.0

      - name: Aggregate reports into Firestore trending
        env:
          FIREBASE_PROJECT_ID: scamradar-prod
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/update-trending.mjs
