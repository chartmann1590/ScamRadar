name: Signed Release Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  workflow_run:
    workflows: ['Unit Tests']
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine version
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE_TAG=$(date +%Y%m%d)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${VERSION_NAME}-${DATE_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Validate release secrets
        env:
          TEST_ADMOB_APP_ID: ca-app-pub-3940256099942544~3347511713
          TEST_ADMOB_BANNER_ID: ca-app-pub-3940256099942544/6300978111
          TEST_ADMOB_INTERSTITIAL_ID: ca-app-pub-3940256099942544/1033173712
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID: ${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID: ${{ secrets.ADMOB_INTERSTITIAL_ID }}
        run: |
          test -n "$GOOGLE_SERVICES_JSON"
          test -n "$KEYSTORE_BASE64"
          test -n "$KEYSTORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          test -n "$ADMOB_APP_ID"
          test -n "$ADMOB_BANNER_ID"
          test -n "$ADMOB_INTERSTITIAL_ID"
          test "$ADMOB_APP_ID" != "$TEST_ADMOB_APP_ID"
          test "$ADMOB_BANNER_ID" != "$TEST_ADMOB_BANNER_ID"
          test "$ADMOB_INTERSTITIAL_ID" != "$TEST_ADMOB_INTERSTITIAL_ID"

      - name: Restore google-services.json
        run: printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Decode keystore
        run: printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build signed APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID: ${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID: ${{ secrets.ADMOB_INTERSTITIAL_ID }}

      - name: Build signed App Bundle
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID: ${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID: ${{ secrets.ADMOB_INTERSTITIAL_ID }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Create tag for workflow_run builds
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          git tag "${{ steps.version.outputs.release_tag }}"
          git push origin "${{ steps.version.outputs.release_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || steps.version.outputs.release_tag }}
          name: ScamRadar ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.release_tag }})
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
